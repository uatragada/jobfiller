name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Backend and frontend checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

      - name: Check cross-platform startup script syntax
        run: python -m py_compile start_jobfiller.py

      - name: Run clone-readiness doctor
        run: python scripts/doctor.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Run frontend flow tests
        working-directory: app/frontend
        run: npm test

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build
